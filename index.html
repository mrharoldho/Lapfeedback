<!DOCTYPE html>
<html>
<head>
<title>Personal Lap Time Analysis</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>

<style>
body{
font-family:Arial;
text-align:center;
background:#f4f6f7;
}

.container{
width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.2);
}

h1{
color:#2c3e50; /* 🎨 Title color */
}

button{
font-size:18px;
padding:12px;
margin:8px;
cursor:pointer;
}

#lapButton{
background:#2ecc71;
color:white;
border:none;
border-radius:10px;
width:300px;
}

#timer{
font-size:40px;
margin:20px;
}

table{
margin:auto;
border-collapse:collapse;
}

td,th{
border:1px solid #ddd;
padding:8px;
}

textarea{
width:90%;
height:80px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container" id="reportArea">

<h1>Personal Lap Time Analysis</h1>

<div id="setup">
Runner Name<br>
<input id="name"><br><br>

Track Distance (m)<br>
<input id="track" value="400"><br><br>

Total Distance (m)<br>
<input id="distance" value="2400"><br><br>

<button onclick="startRun()">START RUN</button>
</div>

<div id="run" style="display:none">

<h2 id="runnerName"></h2>

<div id="timer">00:00</div>

<h3 id="lapDisplay"></h3>

<button id="lapButton" onclick="recordLap()">
CLICK OR PRESS SPACEBAR<br>WHEN RUNNER PASSES
</button>

<h3 id="lastLap"></h3>

</div>

<div id="results" style="display:none">

<h2 id="reportName"></h2> <!-- 👤 Runner name appears here -->

<h2>Personal Lap Time Analysis</h2>

<table id="lapTable">
<tr>
<th>Lap</th>
<th>Distance (m)</th>
<th>Time (sec)</th>
</tr>
</table>

<br>

<canvas id="graph"></canvas>

<h3 id="analysis"></h3>
<h3 id="feedback"></h3>

<h3>Partner Observations :</h3>
<textarea id="partnerNotes" placeholder="Enter observations here..."></textarea>

<br>

<button onclick="saveAsImage()">Save as Image</button>
<button onclick="resetApp()">New Runner</button>

</div>

</div>

<script>

let startTime;
let lapTimes=[];
let lastLapTime=0;
let laps=0;
let totalLaps=0;
let timerInterval;
let chartInstance=null;

function playBeep(){
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let oscillator = audioCtx.createOscillator();
let gainNode = audioCtx.createGain();

oscillator.connect(gainNode);
gainNode.connect(audioCtx.destination);

oscillator.type = "sine";
oscillator.frequency.value = 800;

gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);

oscillator.start();
oscillator.stop(audioCtx.currentTime + 0.1);
}

function startRun(){

lapTimes=[];
lastLapTime=0;
laps=0;

let track=document.getElementById("track").value;
let distance=document.getElementById("distance").value;

totalLaps=Math.round(distance/track);

document.getElementById("setup").style.display="none";
document.getElementById("run").style.display="block";

let name = document.getElementById("name").value;

document.getElementById("runnerName").innerText=name;
document.getElementById("reportName").innerText="Runner: " + name; // 👤 added here

document.getElementById("lapDisplay").innerText="Lap 0 / "+totalLaps;
document.getElementById("lastLap").innerText="";

startTime=Date.now();
timerInterval=setInterval(updateTimer,100);
}

function updateTimer(){

let elapsed=(Date.now()-startTime)/1000;

let minutes=Math.floor(elapsed/60);
let seconds=(elapsed%60).toFixed(0);

document.getElementById("timer").innerText=
minutes+":"+(seconds<10?"0":"")+seconds;
}

function recordLap(){

if(document.getElementById("run").style.display === "none"){
return;
}

laps++;

let now=(Date.now()-startTime)/1000;
let lapTime=now-lastLapTime;

lapTimes.push(lapTime);
lastLapTime=now;

playBeep();

document.getElementById("lastLap").innerText=
"Last Lap: "+lapTime.toFixed(2)+" sec";

document.getElementById("lapDisplay").innerText=
"Lap "+laps+" / "+totalLaps;

if(laps>=totalLaps){
finishRun();
}
}

document.body.onkeyup=function(e){

let tag = document.activeElement.tagName;

if(tag === "INPUT" || tag === "TEXTAREA"){
return;
}

if(e.code==="Space"){
recordLap();
}
}

function finishRun(){

clearInterval(timerInterval);

document.getElementById("run").style.display="none";
document.getElementById("results").style.display="block";

let table=document.getElementById("lapTable");
table.innerHTML = "<tr><th>Lap</th><th>Distance (m)</th><th>Time (sec)</th></tr>";

let track = parseFloat(document.getElementById("track").value);

lapTimes.forEach((t,i)=>{
let row=table.insertRow();
row.insertCell(0).innerText=i+1;
row.insertCell(1).innerText=track;
row.insertCell(2).innerText=t.toFixed(2);
});

createGraph();
analyzePacing();
}

function createGraph(){

if(chartInstance){
chartInstance.destroy();
}

chartInstance = new Chart(document.getElementById("graph"),{
type:"line",
data:{
labels:lapTimes.map((_,i)=>"Lap "+(i+1)),
datasets:[{
label:"Lap Time (sec)",
data:lapTimes,
fill:false
}]
}
});
}

function analyzePacing(){

let oldEst = document.getElementById("estimate");
if(oldEst) oldEst.remove();

let first=lapTimes[0];
let last=lapTimes[lapTimes.length-1];
let trend = last - first;

let changes=[];
for(let i=1;i<lapTimes.length;i++){
changes.push(lapTimes[i]-lapTimes[i-1]);
}

let directionChanges=0;
for(let i=1;i<changes.length;i++){
if((changes[i]>0 && changes[i-1]<0) || (changes[i]<0 && changes[i-1]>0)){
directionChanges++;
}
}

let variance=Math.max(...lapTimes)-Math.min(...lapTimes);

let descriptionParts=[];
let feedbackParts=[];

if(trend > 5){
descriptionParts.push("Your lap times show an overall slowing trend across the run.");
feedbackParts.push("You may have started too fast. Try beginning slightly slower.");
}
else if(trend < -5){
descriptionParts.push("Your lap times improve towards the end of the run.");
feedbackParts.push("Strong finish. You may be able to start faster.");
}
else{
descriptionParts.push("Your overall pacing trend is steady.");
feedbackParts.push("Good overall pacing control.");
}

if(directionChanges >= 2 && variance > 5){
descriptionParts.push("However, your lap times fluctuate significantly between laps.");
feedbackParts.push("Focus on maintaining a steady rhythm.");
}
else if(variance < 5){
descriptionParts.push("Your lap times are very consistent.");
feedbackParts.push("Excellent pacing discipline.");
}
else{
descriptionParts.push("There is some variation in your lap times.");
feedbackParts.push("Work on reducing variation.");
}

document.getElementById("analysis").innerText=descriptionParts.join(" ");
document.getElementById("feedback").innerText=feedbackParts.join(" ");

let totalTime = lapTimes.reduce((a,b)=>a+b);
let track = parseFloat(document.getElementById("track").value);
let distanceCovered = lapTimes.length * track;

let estimatedTime = (totalTime / distanceCovered) * 2400;

if(trend > 5) estimatedTime *= 1.03;
if(trend < -5) estimatedTime *= 0.98;

let minutes=Math.floor(estimatedTime/60);
let seconds=Math.round(estimatedTime%60);

let est=document.createElement("h2");
est.id="estimate";
est.innerText="Estimated 2.4km Time: "+minutes+":"+(seconds<10?"0":"")+seconds;

document.getElementById("results").prepend(est);
}

function saveAsImage(){

html2canvas(document.getElementById("reportArea")).then(canvas=>{
let link=document.createElement("a");
link.download="lap-analysis.jpg";
link.href=canvas.toDataURL("image/jpeg");
link.click();
});
}

function resetApp(){

lapTimes=[];
laps=0;
lastLapTime=0;

document.getElementById("partnerNotes").value="";
document.getElementById("analysis").innerText="";
document.getElementById("feedback").innerText="";
document.getElementById("lastLap").innerText="";
document.getElementById("timer").innerText="00:00";
document.getElementById("name").value="";

let oldEst = document.getElementById("estimate");
if(oldEst) oldEst.remove();

if(chartInstance){
chartInstance.destroy();
}

document.getElementById("results").style.display="none";
document.getElementById("setup").style.display="block";
}

</script>

</body>
</html>
